Debian  = "¾░úÜ"
Redhat  = "¾▒äø"
RedHatEnterprise = "¾▒äø"

# ======================
# ­şôü DIRECTORY + BRACKETS
# ======================

[custom.left_bracket]
command = "echo '['"
when = "true"
style = "fg:orange"

[directory]
style = "fg:fg1"
format = "[$path ]($style)"
truncation_length = 1
truncation_symbol = ""

[custom.right_bracket]
command = "echo ']'"
when = "true"
style = "fg:orange"

# ======================
# ­şî▒ GIT
# ======================

[git_branch]
symbol = "´Éİ "
format = "[ $symbol$branch ]($style)"
style = "fg:purple"

[git_status]
format = "[$all_status$ahead_behind]($style)"
style = "fg:yellow"

conflicted = "[¯«½ ](fg:red)"
modified   = "[¯®▒ ](fg:orange)"
staged     = "[ÔùÅ ](fg:green)"
renamed    = "[ÔŞ£ ](fg:blue)"
deleted    = "[Ô£İ ](fg:red)"
untracked  = "[? ](fg:gray)"

ahead      = "[Ôçí${count} ](fg:green)"
behind     = "[Ôçú${count} ](fg:red)"
diverged   = "[ÔçòÔçí${ahead_count}Ôçú${behind_count} ](fg:orange)"

up_to_date = "[´Çî ](fg:green)"
stashed    = "[´úû ](fg:aqua)"

# ======================
# ­şğá LANGUAGES (one color each)
# ======================

[c]
symbol = "¯İŞ "
