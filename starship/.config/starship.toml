"$schema" = "https://starship.rs/config-schema.json"

palette = "gruvbox_dark"

format = """
$os \
${custom.left_bracket}\
$directory\
${custom.right_bracket}\
$git_branch\
$git_status\
$dotnet\
$c\
$golang\
$rust\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$docker_context\
$character
"""

# ======================
# ­şÄ¿ PALETTE
# ======================

[palettes.gruvbox_dark]
fg0 = "#fbf1c7"
fg1 = "#ebdbb2"
fg2 = "#d5c4a1"
bg0 = "#282828"
bg1 = "#3c3836"
bg2 = "#504945"
bg3 = "#665c54"

red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
purple = "#b16286"
aqua = "#689d6a"
orange = "#d65d0e"
gray = "#928374"

# ======================
# ­şûÑ OS
# ======================

[os]
disabled = false
style = "fg:fg2"

[os.symbols]
Windows = "¾░ı▓"
Ubuntu  = "¾░òê"
SUSE    = "´îö"
Raspbian= "¾░É┐"
Mint    = "¾░ú¡"
Macos   = "¯İş"
